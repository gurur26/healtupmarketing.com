<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Çağla Çakırgöz – HealthUp Marketing</title>
<meta property="og:title" content="Çağla Çakırgöz – HealthUp Marketing">
<meta property="og:image" content="https://healthupmarketing.com/wp-content/uploads/2025/01/Varlik-6@4x-8.png">
<meta name="robots" content="noindex, nofollow">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --grad: linear-gradient(135deg, #FF6B35 0%, #FF4E8E 100%);
    --grad-soft: linear-gradient(135deg, rgba(255,107,53,0.13) 0%, rgba(255,78,142,0.13) 100%);
    --bg: #0D0D12;
    --surface: #17171F;
    --surface2: #1F1F2A;
    --text: #F2F2F7;
    --text-muted: #7F7F9A;
    --border: rgba(255,255,255,0.07);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding-bottom: 60px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 55% 35% at 85% 5%, rgba(255,78,142,0.13) 0%, transparent 65%),
      radial-gradient(ellipse 45% 45% at 5% 90%, rgba(255,107,53,0.10) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }

  .card { width: 100%; max-width: 430px; position: relative; z-index: 1; }

  .top-bar { height: 3px; background: var(--grad); }

  /* HERO */
  .hero {
    position: relative;
    padding: 40px 24px 28px;
    text-align: center;
  }
  .hero::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,107,53,0.13) 0%, transparent 75%);
    pointer-events: none;
  }

  .logo-wrap { display: flex; justify-content: center; margin-bottom: 18px; position: relative; z-index: 1; }

  .logo-ring {
    width: 112px; height: 112px;
    border-radius: 50%;
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(255,107,53,0.45), 0 8px 32px rgba(255,78,142,0.22);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    animation: logoIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes logoIn { from { opacity:0; transform:scale(0.72); } to { opacity:1; transform:scale(1); } }

  .logo-ring img { width: 86px; height: 86px; object-fit: contain; }

  .org-name {
    position: relative; z-index: 1;
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.18em;
    background: var(--grad);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: fadeUp 0.6s 0.1s both;
  }

  .person-name {
    position: relative; z-index: 1;
    margin-top: 7px;
    font-family: 'Syne', sans-serif;
    font-size: 30px; font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em; line-height: 1.1;
    animation: fadeUp 0.6s 0.17s both;
  }

  .title-share-row {
    position: relative; z-index: 1;
    margin-top: 10px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    animation: fadeUp 0.6s 0.24s both;
  }

  .person-title {
    font-size: 12px; font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.08em; text-transform: uppercase;
    font-family: 'Outfit', sans-serif;
  }

  .share-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 14px; border-radius: 999px;
    background: var(--grad); border: none;
    color: #fff; font-size: 12px; font-weight: 600;
    font-family: 'Outfit', sans-serif; cursor: pointer;
    letter-spacing: 0.03em;
    transition: opacity 0.18s, transform 0.18s;
  }
  .share-btn:hover { opacity: 0.82; transform: scale(1.05); }
  .share-btn svg { width: 12px; height: 12px; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  /* ACTION LIST */
  .actions {
    padding: 0 18px; margin-top: 22px;
    display: flex; flex-direction: column; gap: 9px;
    animation: fadeUp 0.6s 0.3s both;
  }

  .action-btn {
    display: flex; align-items: center; justify-content: flex-start; gap: 12px;
    padding: 15px 16px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    text-decoration: none; color: var(--text);
    font-size: 14px; font-weight: 600;
    font-family: 'Outfit', sans-serif;
    transition: background 0.18s, transform 0.18s, border-color 0.18s;
    cursor: pointer; position: relative; overflow: hidden;
    width: 100%; text-align: left;
  }
  .action-btn::before {
    content: ''; position: absolute; inset: 0;
    background: var(--grad-soft); opacity: 0; transition: opacity 0.2s;
  }
  .action-btn:hover::before { opacity: 1; }
  .action-btn:hover { border-color: rgba(255,107,53,0.3); transform: translateX(3px); }
  .action-btn:active { transform: scale(0.98); }

  .action-btn.save { background: var(--grad); border: none; }
  .action-btn.save::before { display: none; }
  .action-btn.save:hover { opacity: 0.87; transform: translateX(3px); }

  .action-btn.invoice { background: var(--surface2); border-color: rgba(255,255,255,0.1); }
  .action-btn.invoice.copied {
    background: linear-gradient(135deg, #1a7a5e 0%, #0f5e4b 100%);
    border-color: transparent;
  }

  .icon-circle {
    width: 38px; height: 38px; border-radius: 11px;
    background: var(--grad-soft);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative; z-index: 1;
  }
  .action-btn.save .icon-circle   { background: rgba(255,255,255,0.18); }
  .action-btn.invoice .icon-circle { background: rgba(255,255,255,0.08); }
  .action-btn.invoice.copied .icon-circle { background: rgba(255,255,255,0.15); }
  .icon-circle svg { width: 18px; height: 18px; }

  .btn-text { position: relative; z-index: 1; }
  .action-btn.save .btn-text { color: #fff; }

  .chevron { display: none; }

  /* 2-column grid for non-save buttons */
  .actions-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
    padding: 0 18px;
    margin-top: 9px;
    animation: fadeUp 0.6s 0.35s both;
  }
  .actions-grid .action-btn {
    font-size: 13px;
    padding: 14px 12px;
    gap: 9px;
  }
  .actions-grid .icon-circle {
    width: 32px; height: 32px; border-radius: 9px;
    flex-shrink: 0;
  }
  .actions-grid .icon-circle svg { width: 16px; height: 16px; }

  /* SOCIALS */
  .section { padding: 0 18px; margin-top: 20px; animation: fadeUp 0.6s 0.42s both; }

  .section-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 11px; padding-left: 2px;
  }

  .socials { display: flex; gap: 9px; }

  .social-link {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 7px;
    padding: 13px 6px 11px;
    border-radius: var(--radius);
    background: var(--surface); border: 1px solid var(--border);
    text-decoration: none; color: var(--text-muted);
    font-size: 10px; font-weight: 500;
    transition: all 0.18s;
    letter-spacing: 0.04em; text-transform: uppercase;
    font-family: 'Outfit', sans-serif;
  }
  .social-link:hover { border-color: rgba(255,107,53,0.4); color: var(--text); transform: translateY(-3px); background: var(--surface2); }

  .sicon { width: 36px; height: 36px; border-radius: 50%; background: var(--grad-soft); display: flex; align-items: center; justify-content: center; }
  .sicon svg { width: 18px; height: 18px; }

  /* QR */
  .qr-section {
    margin: 26px 18px 0;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    animation: fadeUp 0.6s 0.5s both;
  }
  .qr-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); font-family: 'Outfit', sans-serif; }

  #qrcode { padding: 14px; background: #fff; border-radius: 16px; box-shadow: 0 0 0 1.5px rgba(255,107,53,0.35), 0 10px 36px rgba(0,0,0,0.4); }
  #qrcode canvas, #qrcode img { display: block; border-radius: 4px; }

  .footer { margin-top: 28px; text-align: center; font-size: 10px; color: rgba(255,255,255,0.13); letter-spacing: 0.07em; font-family: 'Outfit', sans-serif; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--surface2); border: 1px solid rgba(255,107,53,0.4);
    color: var(--text); padding: 10px 22px; border-radius: 999px;
    font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.28s;
    z-index: 999; white-space: nowrap; font-family: 'Outfit', sans-serif;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

<div class="toast" id="toast"></div>

<script>
const T = {
  tr: { share:'Paylaş', title:'Kurucu', saveVal:'Rehbere Kaydet', whatsappLbl:'WhatsApp', mobileLbl:'Mobile', emailLbl:'E-posta', websiteLbl:'Website', locationLbl:'Konum', invoiceLbl:'Fatura Bilgisi', invoiceCopied:'Kopyalandı!', socialLbl:'Sosyal Medya', qrLbl:'QR ile kartı tara', toastShare:'Bağlantı kopyalandı!', toastSave:'Kişi kaydedildi!' },
  en: { share:'Share', title:'Owner', saveVal:'Save Contact', whatsappLbl:'WhatsApp', mobileLbl:'Mobile', emailLbl:'Email', websiteLbl:'Website', locationLbl:'Location', invoiceLbl:'Invoice Info', invoiceCopied:'Copied!', socialLbl:'Social Media', qrLbl:'Scan QR to open card', toastShare:'Link copied!', toastSave:'Contact saved!' },
  de: { share:'Teilen', title:'Inhaber', saveVal:'Kontakt speichern', whatsappLbl:'WhatsApp', mobileLbl:'Mobil', emailLbl:'E-Mail', websiteLbl:'Webseite', locationLbl:'Standort', invoiceLbl:'Rechnungsinfo', invoiceCopied:'Kopiert!', socialLbl:'Soziale Medien', qrLbl:'QR scannen', toastShare:'Link kopiert!', toastSave:'Kontakt gespeichert!' },
  fr: { share:'Partager', title:'Propriétaire', saveVal:'Enregistrer le contact', whatsappLbl:'WhatsApp', mobileLbl:'Mobile', emailLbl:'E-mail', websiteLbl:'Site Web', locationLbl:'Adresse', invoiceLbl:'Info facturation', invoiceCopied:'Copié !', socialLbl:'Réseaux sociaux', qrLbl:'Scanner le QR', toastShare:'Lien copié !', toastSave:'Contact enregistré !' },
};

function getLang() { const n=(navigator.language||'tr').slice(0,2).toLowerCase(); return T[n]?n:'tr'; }

function applyLang() {
  const t=T[getLang()];
  document.getElementById('i18n-share').textContent        = t.share;
  document.getElementById('i18n-person-title').textContent = t.title;
  document.getElementById('i18n-save-val').textContent     = t.saveVal;
  document.getElementById('i18n-whatsapp-lbl').textContent = t.whatsappLbl;
  document.getElementById('i18n-mobile-lbl').textContent   = t.mobileLbl;
  document.getElementById('i18n-email-lbl').textContent    = t.emailLbl;
  document.getElementById('i18n-website-lbl').textContent  = t.websiteLbl;
  document.getElementById('i18n-location-lbl').textContent = t.locationLbl;
  document.getElementById('i18n-invoice-lbl').textContent  = t.invoiceLbl;
  document.getElementById('i18n-social-lbl').textContent   = t.socialLbl;
  document.getElementById('i18n-qr-lbl').textContent       = t.qrLbl;
  document.documentElement.lang = getLang();
}
applyLang();

const PAGE_URL = window.location.href;
new QRCode(document.getElementById('qrcode'), {
  text: PAGE_URL, width: 180, height: 180,
  colorDark: '#0D0D12', colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.H,
});

function shareCard() {
  const t=T[getLang()];
  if(navigator.share){ navigator.share({title:'Çağla Çakırgöz – HealthUp Marketing',url:PAGE_URL}).catch(()=>{}); }
  else { navigator.clipboard.writeText(PAGE_URL).then(()=>showToast(t.toastShare)); }
}

function saveContact() {
  const t=T[getLang()];
  const vcard=['BEGIN:VCARD','VERSION:3.0','FN:Çağla Çakırgöz','N:Çakırgöz;Çağla;;;','ORG:HealthUp Marketing','TITLE:Owner','TEL;TYPE=CELL:+905453755391','EMAIL:info@healthupmarketing.com','URL:https://www.healthupmarketing.com','ADR;TYPE=WORK:;;Çınarlı Mah\\, 1572 Sk. No:33;Konak;İzmir;35170;Turkey','END:VCARD'].join('\r\n');
  const blob=new Blob([vcard],{type:'text/vcard;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='CaglaCakirgoz.vcf'; a.click();
  URL.revokeObjectURL(url);
  showToast(t.toastSave);
}

const INVOICE_TEXT='HealthUpMarketing 1234567890 - Çınarlı Mah, 1572 Sk. No:33, 35170 Konak/İzmir';
let invTimer;
function copyInvoice() {
  const t=T[getLang()];
  const btn=document.getElementById('invoice-btn');
  const lbl=document.getElementById('i18n-invoice-lbl');
  navigator.clipboard.writeText(INVOICE_TEXT).then(()=>{
    btn.classList.add('copied');
    lbl.textContent=t.invoiceCopied;
    showToast(t.invoiceCopied);
    clearTimeout(invTimer);
    invTimer=setTimeout(()=>{ btn.classList.remove('copied'); lbl.textContent=t.invoiceLbl; },2500);
  });
}

let toastTimer;
function showToast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}
</script>
</body>
